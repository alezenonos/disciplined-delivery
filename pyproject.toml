[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
# Encode the project's style standard so the linter — not a reviewer — enforces
# it: PEP-8 (E/W), pyflakes (F), import order (I), naming (N), Google-style
# docstrings (D), modern-Python idioms (UP), and common bugs (B).
select = ["E", "W", "F", "I", "N", "D", "UP", "B"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
# Test functions are exempt from the missing-docstring rule — their names are
# the documentation. Every other rule (naming, imports, bugs) still applies.
"tests/**" = ["D"]
"**/test_*.py" = ["D"]

[tool.coverage.run]
# The tests invoke the scripts/scaffold as subprocesses, so coverage must
# instrument child processes too. `parallel` writes per-process data files that
# pytest-cov then combines; CI exports COVERAGE_PROCESS_START=pyproject.toml so
# the subprocess hook activates. `source` limits measurement to this repo's own
# code (not the app the scaffold generates into a temp dir).
parallel = true
source = ["scripts", "skills/scaffold-agentic-app"]

[tool.coverage.report]
fail_under = 85
show_missing = true
