name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Lint & unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev tools
        run: pip install ruff pytest
      - name: Lint (ruff)
        run: ruff check .
      - name: Unit tests (pytest)
        run: pytest -q

  manifests:
    name: Validate manifests, skills & shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Validate plugin/marketplace manifests and skill frontmatter
        run: python scripts/validate_manifests.py
      - name: Shellcheck install.sh
        run: shellcheck install.sh

  scaffold:
    name: Scaffold generator self-test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Generate an app from the scaffold
        run: python skills/scaffold-agentic-app/scaffold.py "$RUNNER_TEMP/app"
      - name: Compile generated stubs
        run: python -m compileall -q "$RUNNER_TEMP/app"
      - name: Re-run must be idempotent (nothing overwritten)
        run: |
          python skills/scaffold-agentic-app/scaffold.py "$RUNNER_TEMP/app" | tee rerun.log
          grep -q "created: 0 file(s)" rerun.log
      - name: Install generated app deps and run its tests
        run: |
          cd "$RUNNER_TEMP/app"
          pip install -r requirements.txt
          pytest -q
